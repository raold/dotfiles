[Sleep]
# Suspend-then-hibernate: suspend first, hibernate after 30 min
AllowSuspendThenHibernate=yes
HibernateDelaySec=30min
SuspendEstimationSec=30min

# Don't hibernate if on AC (saves SSD wear)
HibernateOnACPower=no

# Use shutdown instead of platform (ACPI S4) — RDNA3 780M GPU crashes on S4 resume
# (sdma0 ring timeout + MES unresponsive). Shutdown mode does a clean power off;
# resume goes through cold boot → find hibernate image → restore session.
HibernateMode=shutdown
