# RAM optimizations for 64 GiB system with ZRAM

# High swappiness for ZRAM — values >100 tell the kernel to prefer
# compressing cold pages into ZRAM over evicting filesystem caches.
# NOTE: Overridden to 100 by 99-zz-swappiness-override.conf
# (150 caused compositor swap thrashing with 30GB+ free RAM)
vm.swappiness = 150

# Keep more dentries/inodes in VFS cache (default=100, lower=keep more)
# With 36+ GiB free RAM, aggressively cache filesystem metadata
vm.vfs_cache_pressure = 10

# Dirty page writeback — absolute bytes (overrides ratio when non-zero)
# 8 GiB dirty limit / 4 GiB background flush — uses RAM for write batching
# before flushing to NVMe. Safe with 54 GiB total, journal protects against data loss.
vm.dirty_bytes = 8589934592
vm.dirty_background_bytes = 4294967296

# Increase dirty writeback interval — flush every 15s instead of 5s
# Lets more writes accumulate in RAM for efficient batching
vm.dirty_expire_centisecs = 6000
vm.dirty_writeback_centisecs = 3000

# Reduce minimum reserved free memory — default 66MB is conservative
# 32MB is plenty for a desktop (kernel still won't let it drop below this)
vm.min_free_kbytes = 32768

# Readahead for swap — lower value since NVMe is fast and ZRAM is RAM
# 0 = read one page at a time (good for ZRAM, bad for spinning disk)
vm.page-cluster = 0

# Watermark boost factor — controls how aggressively kswapd reclaims
# 0 disables boosting, lets more memory be used before reclaim kicks in
vm.watermark_boost_factor = 0
