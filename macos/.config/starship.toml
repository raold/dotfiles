"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_orange)\
[󰀵](bg:color_orange fg:color_fg_dark)\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$python\
$nodejs\
$rust\
$golang\
$c\
$cpp\
$java\
$kotlin\
$haskell\
$php\
$ruby\
$lua\
$zig\
$deno\
$bun\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$cmd_duration\
$jobs\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

